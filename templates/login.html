<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — CryptoEx</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:#0d0d0d;min-height:100vh;display:flex;flex-direction:column;color:#e0e0e0;}
        /* TOP BAR */
        .topbar{height:56px;background:#141414;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;padding:0 24px;justify-content:space-between;}
        .logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
        .logo-icon{width:34px;height:34px;background:#f0b90b;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;color:#000;}
        .logo-text{font-size:17px;font-weight:800;color:#f0b90b;}
        .topbar-links{display:flex;align-items:center;gap:8px;}
        .topbar-links a{padding:7px 18px;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;transition:all 0.2s;}
        .btn-login{background:transparent;border:1px solid #2a2a2a;color:#ccc;}
        .btn-login:hover{border-color:#f0b90b44;color:#f0b90b;}
        .btn-register{background:#f0b90b;color:#000;}
        .btn-register:hover{background:#e0a800;}
        /* MAIN */
        .main{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 16px;}
        .card{width:100%;max-width:420px;background:#141414;border:1px solid #2a2a2a;border-radius:20px;padding:36px 32px;}
        .card-title{font-size:24px;font-weight:800;color:#fff;margin-bottom:6px;}
        .card-sub{font-size:13px;color:#666;margin-bottom:28px;}
        .form-group{margin-bottom:18px;}
        .form-group label{display:block;font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:7px;}
        .form-group input{width:100%;padding:12px 16px;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:10px;color:#fff;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border 0.2s;}
        .form-group input:focus{border-color:#f0b90b44;}
        .form-group input::placeholder{color:#555;}
        .remember-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;font-size:12px;}
        .remember-row label{display:flex;align-items:center;gap:7px;color:#888;cursor:pointer;}
        .remember-row input[type=checkbox]{width:15px;height:15px;accent-color:#f0b90b;}
        .remember-row a{color:#f0b90b;text-decoration:none;}
        .remember-row a:hover{color:#e0a800;}
        .submit-btn{width:100%;padding:14px;background:#f0b90b;border:none;border-radius:10px;color:#000;font-size:15px;font-weight:800;cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif;}
        .submit-btn:hover{background:#e0a800;transform:translateY(-1px);box-shadow:0 6px 20px rgba(240,185,11,0.3);}
        .submit-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
        .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#444;font-size:12px;}
        .divider::before,.divider::after{content:'';flex:1;height:1px;background:#2a2a2a;}
        .error-box{background:rgba(246,70,93,0.1);border:1px solid rgba(246,70,93,0.25);border-radius:8px;padding:10px 14px;font-size:13px;color:#f6465d;margin-bottom:18px;display:none;}
        .error-box.show{display:block;}
        .loading{display:none;text-align:center;font-size:13px;color:#888;margin-top:12px;}
        .spinner{display:inline-block;width:14px;height:14px;border:2px solid #2a2a2a;border-top-color:#f0b90b;border-radius:50%;animation:spin 0.6s linear infinite;margin-right:6px;vertical-align:middle;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .footer-link{text-align:center;margin-top:20px;font-size:13px;color:#666;}
        .footer-link a{color:#f0b90b;text-decoration:none;font-weight:600;}
        .footer-link a:hover{color:#e0a800;}
        /* Trust badges */
        .trust-row{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:24px;padding-top:20px;border-top:1px solid #2a2a2a;}
        .trust-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#666;}
        .trust-item i{color:#f0b90b;font-size:12px;}
        @media(max-width:480px){.card{padding:28px 20px;border-radius:16px;}.main{padding:20px 12px;}}
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="topbar">
    <a href="/" class="logo"><div class="logo-icon">C</div><span class="logo-text">CryptoEx</span></a>
    <div class="topbar-links">
        <a href="/login" class="btn-login">Login</a>
        <a href="/register" class="btn-register">Register</a>
    </div>
</div>

<div class="main">
    <div class="card">
        <div class="card-title">Welcome back</div>
        <div class="card-sub">Sign in to your CryptoEx account</div>

        <div class="error-box" id="errorBox"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
            </div>
            <div class="remember-row">
                <label><input type="checkbox" id="remember"> Remember me</label>
                <a href="#">Forgot password?</a>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">Sign In</button>
            <div class="loading" id="loading"><span class="spinner"></span>Signing in...</div>
        </form>

        <div class="divider"><span>OR</span></div>

        <div class="footer-link">Don't have an account? <a href="/register">Create account →</a></div>

        <div class="trust-row">
            <div class="trust-item"><i class="fas fa-shield-halved"></i> Secure</div>
            <div class="trust-item"><i class="fas fa-lock"></i> Encrypted</div>
            <div class="trust-item"><i class="fas fa-bolt"></i> Instant</div>
        </div>
    </div>
</div>

<script>
const form = document.getElementById('loginForm');
const errBox = document.getElementById('errorBox');
const submitBtn = document.getElementById('submitBtn');
const loading = document.getElementById('loading');

form.addEventListener('submit', async e => {
    e.preventDefault();
    errBox.classList.remove('show');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) { showError('Please fill in all fields'); return; }
    submitBtn.disabled = true; loading.style.display = 'block';
    try {
        const r = await fetch('/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username, password}) });
        const d = await r.json();
        if (r.ok) window.location.href = '/miner';
        else showError(d.message || 'Invalid credentials');
    } catch(e) { showError('Connection error. Please try again.'); }
    finally { submitBtn.disabled = false; loading.style.display = 'none'; }
});

function showError(msg) { errBox.textContent = msg; errBox.classList.add('show'); }
</script>
</body>
</html>
