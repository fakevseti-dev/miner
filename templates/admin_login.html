<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access — NEON</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: #050914;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(240,185,11,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(240,185,11,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .glow-1 {
            position: absolute;
            width: 400px; height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(240,185,11,0.08), transparent 70%);
            top: -100px; left: -100px;
            pointer-events: none;
        }

        .glow-2 {
            position: absolute;
            width: 300px; height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139,92,246,0.08), transparent 70%);
            bottom: -50px; right: -50px;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .card {
            background: rgba(10, 16, 42, 0.95);
            border: 1px solid rgba(240,185,11,0.2);
            border-radius: 20px;
            padding: 40px 32px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(240,185,11,0.08);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header { text-align: center; margin-bottom: 32px; }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #f0b90b, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .admin-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(240,185,11,0.1);
            border: 1px solid rgba(240,185,11,0.25);
            border-radius: 20px;
            padding: 4px 14px;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: #f0b90b;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .admin-tag::before {
            content: '';
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #f0b90b;
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .header h1 {
            font-size: 20px;
            color: #f1f5f9;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 12px;
            color: #64748b;
            font-family: 'Space Mono', monospace;
        }

        .form-group { margin-bottom: 16px; }

        label {
            display: block;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            border: 1.5px solid rgba(240,185,11,0.15);
            border-radius: 10px;
            padding: 12px 14px;
            color: #f1f5f9;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: #f0b90b;
            box-shadow: 0 0 0 3px rgba(240,185,11,0.1);
        }

        input::placeholder { color: #334155; }

        .error {
            background: rgba(240,185,11,0.08);
            border: 1px solid rgba(240,185,11,0.25);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 12px;
            color: #fca5a5;
            margin-bottom: 16px;
            display: none;
        }

        .error.show { display: block; }

        .btn { color: #000 !important; 
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #f0b90b, #d4a007);
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(240,185,11,0.35);
        }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .back {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #475569;
        }

        .back a { color: #f0b90b; text-decoration: none; }
        .back a:hover { color: #fcd535; }

        @media (max-width: 480px) {
            .container { padding: 12px; }
            .card { padding: 28px 18px; border-radius: 16px; }
            .logo { font-size: 22px; }
            .header h1 { font-size: 17px; }
            input { font-size: 16px; /* предотвращает зум на iOS */ padding: 11px 12px; }
            .btn { color: #000 !important;  padding: 12px; font-size: 11px; }
        }

        @media (max-width: 360px) {
            .card { padding: 22px 14px; }
        }
    
/* ── GLOBAL YELLOW-BLACK OVERRIDES ── */
:root {
    --gold: #f0b90b !important;
    --gold2: rgba(240,185,11,0.12) !important;
    --blue: #f0b90b !important;
    --blue2: rgba(240,185,11,0.12) !important;
    --b2: rgba(240,185,11,0.12) !important;
}
.icon-gradient-gold {
    background: linear-gradient(135deg, #f0b90b, #d4a007) !important;
}
/* Override any remaining blue inline elements */
[style*="background:linear-gradient(135deg,#3b82f6"],
[style*="background: linear-gradient(135deg, #3b82f6"],
[style*="background:linear-gradient(135deg,#2563eb"],
[style*="background:linear-gradient(135deg, #06b6d4"] {
    background: linear-gradient(135deg, #f0b90b, #d4a007) !important;
}
a.btn-primary, .btn-primary {
    background: #f0b90b !important;
    color: #000 !important;
    border-color: #f0b90b !important;
}
.btn-primary:hover { background: #d4a007 !important; }

</style>

<style id="theme-override">
/* ═══ CRYPTOEX YELLOW-BLACK UNIVERSAL THEME ═══ */
:root {
  --gold: #f0b90b;
  --gold-dark: #d4a007;
  --gold-light: #fcd535;
  --gold-dim: rgba(240,185,11,0.12);
  --black: #0a0a0a;
  --black2: #111111;
  --black3: #141414;
  --black4: #1a1a1a;
  --black5: #1e1e1e;
  --border-gold: rgba(240,185,11,0.2);
}

/* Force all blue/purple accents → gold */
.text-blue-400, .text-blue-500, .text-blue-600,
.text-cyan-400, .text-cyan-500,
.text-purple-400, .text-purple-500 {
  color: #f0b90b !important;
}
.bg-blue-500, .bg-blue-600, .bg-blue-700,
.bg-cyan-500, .bg-purple-500, .bg-purple-600 {
  background-color: #f0b90b !important;
  color: #000 !important;
}
.border-blue-500, .border-blue-400,
.border-cyan-400, .border-cyan-500 {
  border-color: rgba(240,185,11,0.4) !important;
}
.from-blue-400, .from-blue-500, .from-blue-600 { --tw-gradient-from: #f0b90b !important; }
.to-cyan-400, .to-cyan-500 { --tw-gradient-to: #f59e0b !important; }

/* Global button accent */
button[style*="background:#3b82f6"],
button[style*="background: #3b82f6"],
button[style*="background-color:#3b82f6"] {
  background: #f0b90b !important;
  color: #000 !important;
}

/* Focus rings */
input:focus, textarea:focus, select:focus {
  border-color: rgba(240,185,11,0.5) !important;
  box-shadow: 0 0 0 2px rgba(240,185,11,0.12) !important;
}

/* Scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: #111; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #f0b90b44; }

/* Selection */
::selection { background: rgba(240,185,11,0.25); color: #fff; }
</style>
</head>
<body>
<div class="glow-1"></div>
<div class="glow-2"></div>

<div class="container">
    <div class="card">
        <div class="header">
            <div class="logo">⚡ NEON</div>
            <div class="admin-tag">Admin Access</div>
            <h1>Панель управления</h1>
            <p>Только для авторизованных</p>
        </div>

        <div class="error" id="errorMsg"></div>

        <div class="form-group">
            <label>Логин администратора</label>
            <input type="text" id="username" placeholder="admin" autocomplete="off">
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()">
        </div>

        <button class="btn" id="loginBtn" onclick="login()">→ Войти в панель</button>

        <div class="back"><a href="/">← Вернуться на сайт</a></div>
    </div>
</div>

<script>
async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const err = document.getElementById('errorMsg');
    const btn = document.getElementById('loginBtn');

    if (!username || !password) { err.textContent = 'Заполните все поля'; err.classList.add('show'); return; }
    err.classList.remove('show');
    btn.disabled = true;
    btn.textContent = '...';

    try {
        const r = await fetch('/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await r.json();
        if (r.ok) {
            window.location.href = '/admin';
        } else {
            err.textContent = data.message || 'Неверные данные';
            err.classList.add('show');
        }
    } catch(e) {
        err.textContent = 'Ошибка подключения';
        err.classList.add('show');
    } finally {
        btn.disabled = false;
        btn.textContent = '→ Войти в панель';
    }
}
</script>
</body>
</html>
